name: Keep DataTerminal Alive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Wake up DataTerminal with real browser
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              print("Opening DataTerminal...")
              page.goto("https://ssnegi05-dataterminal.streamlit.app/", wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(15000)
              print("Done — Streamlit session established")
              browser.close()
          EOF
